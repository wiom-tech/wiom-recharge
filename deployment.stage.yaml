apiVersion: apps/v1
kind: Deployment
metadata:
  name: remote-stage-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remote-stage
  template:
    metadata:
      labels:
        app: remote-stage
    spec:
      containers:
      - name: remote-stage
        image: 099219084111.dkr.ecr.ap-southeast-1.amazonaws.com/remote:latest
        ports:
        - containerPort: 80
  
---
apiVersion: v1
kind: Service
metadata:
  name: remote-stage-service
spec:
  type: LoadBalancer
  selector:
    app: remote-stage
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: remote-stage-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: remote.stage.i2e1.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: remote-stage-service
            port:
              number: 80