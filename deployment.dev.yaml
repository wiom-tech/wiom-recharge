apiVersion: apps/v1
kind: Deployment
metadata:
  name: remote-dev-deployment
  namespace: remote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remote-dev
  template:
    metadata:
      labels:
        app: remote-dev
    spec:
      containers:
      - name: remote-dev
        image: 099219084111.dkr.ecr.ap-south-1.amazonaws.com/remote:latest
        ports:
        - containerPort: 80
        
---
apiVersion: v1
kind: Service
metadata:
  name: remote-dev-service
  namespace: remote
spec:
  type: LoadBalancer
  selector:
    app: remote-dev
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: remote-dev-ingress
  namespace: remote
spec:
  ingressClassName: nginx
  rules:
  - host: remote.dev.i2e1.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: remote-dev-service
            port:
              number: 80